query getDetailMaster($groupId: String!) {
  group: groupByPk(id: $groupId) {
    id
    accounts(where: { validFlag: { _eq: true } }, orderBy: { displayOrder: ASC }) {
      id
      name
    }
    incomeGenres: genres(
      where: { iocomeType: { _eq: "INCOME" }, _and: { validFlag: { _eq: true } } }
      orderBy: { displayOrder: ASC }
    ) {
      ...genreFrag
    }
    outcomeGenres: genres(
      where: { iocomeType: { _eq: "OUTCOME" }, _and: { validFlag: { _eq: true } } }
      orderBy: { displayOrder: ASC }
    ) {
      ...genreFrag
    }
    tags(orderBy: { displayOrder: ASC }) {
      id
      name
      colorCode
    }
    templates {
      id
      name
      iocomeType
      genreId
      categoryId
      accountId
      amount
      memo
    }
  }
}

fragment genreFrag on HouseholdGenre {
  id
  name
  iocomeType
  genreType
  categories(where: { validFlag: { _eq: true } }, orderBy: { displayOrder: ASC }) {
    id
    name
  }
}
