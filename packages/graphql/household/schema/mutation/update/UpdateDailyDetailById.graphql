mutation UpdateDailyDetailById(
  $id: String!
  $date: date!
  $genreId: String!
  $iocomeType: String!
  $categoryId: String!
  $accountId: String!
  $amount: numeric!
  $memo: String
  $tagDetails: [HouseholdDetailTagInsertInput!]!
) {
  updateDailyDetailByPk: updateHouseholdDailyDetailByPk(
    _set: {
      date: $date
      genreId: $genreId
      iocomeType: $iocomeType
      categoryId: $categoryId
      accountId: $accountId
      amount: $amount
      memo: $memo
    }
    pkColumns: { id: $id }
  ) {
    __typename
    id
  }
  deleteDetailTags: deleteHouseholdDetailTag(where: { detailId: { _eq: $id } }) {
    affectedRows
  }
  insertDetailTags: insertHouseholdDetailTag(objects: $tagDetails) {
    affectedRows
  }
}
