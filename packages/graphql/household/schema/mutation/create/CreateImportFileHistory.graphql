mutation CreateImportFileHistory(
  $id: String!
  $fileName: String!
  $fileType: String!
  $groupId: String!
  $importDatetime: timestamp!
  $importUserId: String!
  $importContents: json
) {
  insertImportFileHistory: insertHouseholdImportFileHistory(
    objects: {
      id: $id
      fileType: $fileType
      fileName: $fileName
      importUserId: $importUserId
      importDatetime: $importDatetime
      groupId: $groupId
      importContents: $importContents
    }
  ) {
    returning {
      id
    }
  }
}
