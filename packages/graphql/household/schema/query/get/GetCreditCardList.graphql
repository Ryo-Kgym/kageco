query GetCreditCardList($groupId: String!) {
  allCreditCardSummariesList: householdCreditCardSummary(
    where: { groupId: { _eq: $groupId } }
    orderBy: { withdrawalDate: DESC }
  ) {
    id
    creditCard
    account {
      id
      name
    }
    count
    withdrawalDate
    totalAmount
    details: creditCardDetails {
      __typename
      id
      amount
    }
    fileImportHistory {
      __typename
      id
      importDatetime
      fileName
      user {
        __typename
        id
        name
      }
    }
  }
}
