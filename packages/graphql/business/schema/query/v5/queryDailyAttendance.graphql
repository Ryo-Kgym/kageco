query getAttendance($date: date!, $groupId: String!, $userId: String!) {
  day: businessDailyAttendance(
    where: {
      date: { _eq: $date }
      _and: { groupId: { _eq: $groupId }, _and: { userId: { _eq: $userId } } }
    }
  ) {
    ...fragDailyAttendance
  }
}

query getAttendanceOfMonth(
  $fromDate: date!
  $toDate: date!
  $yearMonth: bpchar!
  $groupId: String!
  $userId: String!
) {
  days: businessDailyAttendance(
    where: {
      date: { _gte: $fromDate, _lte: $toDate }
      _and: { groupId: { _eq: $groupId }, _and: { userId: { _eq: $userId } } }
    }
  ) {
    ...fragDailyAttendance
  }
  monthlyPlan: businessMonthlyPlan(
    where: { userId: { _eq: $userId }, _and: { yearMonth: { _eq: $yearMonth } } }
    , limit: 1
  ) {
    ...fragMonthlyPlan
  }
}

query getAttendanceLogById($id: String!) {
  log: businessDailyAttendanceLogByPk(id: $id) {
    __typename
    id
    state
    memo
    datetime
    dailyAttendance {
      ...fragDailyAttendance
    }
  }
}

fragment fragDailyAttendance on BusinessDailyAttendance {
  __typename
  id
  date
  startDatetime
  endDatetime
  breakSecond
  logs: dailyAttendanceLogs(orderBy: { datetime: ASC }) {
    __typename
    id
    datetime
    state
    memo
  }
}
