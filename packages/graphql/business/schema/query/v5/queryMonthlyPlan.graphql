query getMonthlyPlan($userId: String!, $yearMonth: bpchar!) {
  monthlyPlan: businessMonthlyPlan(
    where: {
      userId: { _eq: $userId }
      _and: { yearMonth: { _eq: $yearMonth } }
    }
    , limit: 1
  ) {
    ...fragMonthlyPlan
  }
}

fragment fragMonthlyPlan on BusinessMonthlyPlan {
  __typename
  id
  yearMonth
  businessDays
  plannedWorkingHoursLower
  plannedWorkingHoursUpper
}
