name: Java CI with Gradle and Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend/api

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper
          build-root-directory: ./backend/api

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Check code formatting
        run: ./gradlew spotlessCheck

      - name: Run static analysis
        run: ./gradlew codeQualityCheck

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      - name: Build application
        run: ./gradlew build -x test

      - name: Upload test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Gradle Tests
          path: ./backend/api/build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./backend/api/build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: build-artifacts
          path: ./backend/api/build/libs/